const ElementTile = ({ number, symbol, name, onClick }) => (
  <div
    onClick={onClick}
    style={{
      width: "64px", height: "68px",
      background: "linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)",
      borderRadius: "6px", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", cursor: "pointer",
      position: "relative",
      boxShadow: "0 0 12px rgba(59, 130, 246, 0.3), inset 0 1px 0 rgba(255,255,255,0.15)",
      transition: "all 0.2s ease", border: "1px solid rgba(255,255,255,0.1)",
    }}
    onMouseEnter={(e) => { e.currentTarget.style.transform = "scale(1.08)"; }}
    onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}
  >
    <span style={{ fontSize: "9px", color: "rgba(255,255,255,0.7)", fontWeight: "600", position: "absolute", top: "4px", left: "6px" }}>{number}</span>
    <span style={{ fontSize: "22px", fontWeight: "800", color: "#fff", letterSpacing: "1px", lineHeight: 1 }}>{symbol}</span>
    <span style={{ fontSize: "7.5px", color: "rgba(255,255,255,0.85)", fontWeight: "600", marginTop: "2px", textTransform: "uppercase", letterSpacing: "0.5px" }}>{name}</span>
  </div>
);

const TerminalLine = ({ line, visible }) => {
  const [typed, setTyped] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (!visible) return;
    if (line.type === "cmd") {
      let i = 0;
      const iv = setInterval(() => { i++; setTyped(line.text.slice(0, i)); if (i >= line.text.length) { clearInterval(iv); setDone(true); } }, 12);
      return () => clearInterval(iv);
    } else {
      const t = setTimeout(() => { setTyped(line.text); setDone(true); }, 80);
      return () => clearTimeout(t);
    }
  }, [visible, line]);
  if (!visible) return null;
  const colors = { cmd: "#22d3ee", output: "#94a3b8", system: "#a78bfa", warn: "#f87171" };
  return (
    <div style={{ fontFamily: "'JetBrains Mono', 'Fira Code', monospace", fontSize: "12px", lineHeight: "1.7", color: colors[line.type] || "#94a3b8", whiteSpace: "pre-wrap", wordBreak: "break-all", opacity: done ? 1 : 0.8, borderLeft: line.type === "warn" ? "2px solid #f87171" : "none", paddingLeft: line.type === "warn" ? "10px" : line.type === "output" ? "8px" : "0" }}>
      {typed}
      {!done && line.type === "cmd" && <span style={{ animation: "blink 0.8s infinite", color: "#22d3ee" }}>▊</span>}
    </div>
  );
};
